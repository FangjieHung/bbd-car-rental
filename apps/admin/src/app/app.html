<div class="app-shell">
  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav
      #drawer
      class="app-sidenav"
      [mode]="isMobile ? 'over' : 'side'"
      [opened]="isMobile ? isSidenavOpen : true"
      (closedStart)="isSidenavOpen = false"
    >
      <div class="sidenav-inner">
        <div class="brand">
          <div class="brand-mark">P</div>
          <div class="brand-copy">
            <h1>{{ t.app.title }}</h1>
            <p>管理中心</p>
          </div>
        </div>

        <nav class="nav-list" aria-label="主導覽">
          <a
            *ngFor="let item of navItems"
            class="nav-link"
            [routerLink]="item.route"
            routerLinkActive="active"
            (click)="onNavClick()"
          >
            <span class="nav-icon">{{ item.icon }}</span>
            <span>{{ item.label }}</span>
          </a>
        </nav>

        <div class="sidenav-footer">
          <app-theme-switcher />

          <div class="user-card">
            <div class="avatar">A</div>
            <div>
              <strong>管理員</strong>
              <p>已登入</p>
            </div>
          </div>
        </div>
      </div>
    </mat-sidenav>

    <mat-sidenav-content class="content-area">
      <header class="topbar">
        <button mat-icon-button class="menu-toggle" type="button" (click)="toggleSidenav()">
          <mat-icon>menu</mat-icon>
        </button>

        <div class="topbar-title">
          <p>歡迎回來</p>
          <h2>{{ currentTitle }}</h2>
        </div>

        <button mat-stroked-button type="button">登出</button>
      </header>

      <main class="page-shell">
        <router-outlet />
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
