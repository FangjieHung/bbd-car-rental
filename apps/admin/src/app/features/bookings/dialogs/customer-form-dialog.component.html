<h2 mat-dialog-title>{{ data ? t.common.edit : t.common.create }}</h2>
<form [formGroup]="form" (ngSubmit)="save()" mat-dialog-content class="form-shell">
  <mat-form-field
    ><mat-label>{{ t.customer.name }}</mat-label
    ><input matInput formControlName="name"
  /></mat-form-field>
  <mat-form-field
    ><mat-label>{{ t.customer.phone }}</mat-label
    ><input matInput formControlName="phone"
  /></mat-form-field>
  <mat-form-field
    ><mat-label>{{ t.customer.idNumber }}</mat-label
    ><input matInput formControlName="idNumber"
  /></mat-form-field>
  <mat-form-field
    ><mat-label>{{ t.customer.note }}</mat-label
    ><input matInput formControlName="note"
  /></mat-form-field>
  <div class="actions">
    <button mat-button type="button" (click)="ref.close()">{{ t.common.cancel }}</button>
    <button mat-flat-button type="submit" [disabled]="form.invalid">{{ t.common.save }}</button>
  </div>
</form>
