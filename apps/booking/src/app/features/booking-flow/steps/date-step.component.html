<div class="date-step">
  <mat-form-field appearance="outline">
    <mat-label>取車時間</mat-label>
    <input matInput type="datetime-local" [(ngModel)]="startDateTime" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>還車時間</mat-label>
    <input matInput type="datetime-local" [(ngModel)]="endDateTime" />
  </mat-form-field>

  <div class="actions">
    <button mat-flat-button color="primary" [disabled]="!startDateTime || !endDateTime" (click)="confirm()">
      確認租期
    </button>
  </div>
</div>
