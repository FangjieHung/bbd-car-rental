<div class="booking-flow">
  @if (partner(); as p) {
    <div class="partner-banner">{{ p.name }} 專屬預約</div>
  }
  <h1>租車預約</h1>

  <mat-stepper orientation="horizontal" [linear]="false" #stepper>
    <mat-step label="租期">
      <app-date-step
        [dateRange]="dateRange()"
        (dateRangeChange)="onDateRangeChange($event)"
      ></app-date-step>
      <div class="step-nav">
        <button mat-flat-button color="primary" [disabled]="!dateStepDone()" matStepperNext>
          下一步
        </button>
      </div>
    </mat-step>

    <mat-step label="車款">
      <app-vehicle-step
        [vehicles]="availableVehicles()"
        [selectedVehicle]="selectedVehicle()"
        [priceForVehicle]="priceForVehicle.bind(this)"
        (vehicleSelect)="onVehicleSelect($event)"
      ></app-vehicle-step>
      <div class="step-nav">
        <button mat-stroked-button matStepperPrevious>上一步</button>
        <button mat-flat-button color="primary" [disabled]="!vehicleStepDone()" matStepperNext>
          下一步
        </button>
      </div>
    </mat-step>

    <mat-step label="配件">
      <app-addon-step
        [addOns]="addOns()"
        [addOnQty]="addOnQty()"
        (addOnQtyChange)="onAddOnQtyChange($event.addOnId, $event.qty)"
      ></app-addon-step>
      <div class="step-nav">
        <button mat-stroked-button matStepperPrevious>上一步</button>
        <button mat-flat-button color="primary" matStepperNext>下一步</button>
      </div>
    </mat-step>

    <mat-step label="優惠券">
      <app-coupon-step
        [couponCode]="couponCode()"
        [couponResult]="couponResult()"
        [priceBreakdown]="priceBreakdown()"
        (couponCodeChange)="onCouponCodeChange($event)"
      ></app-coupon-step>
      <div class="step-nav">
        <button mat-stroked-button matStepperPrevious>上一步</button>
        <button mat-flat-button color="primary" matStepperNext>下一步</button>
      </div>
    </mat-step>

    <mat-step label="確認">
      <app-confirm-step
        [vehicle]="selectedVehicle()"
        [startDate]="startDate()"
        [endDate]="endDate()"
        [selectedAddOnLines]="selectedAddOnLines()"
        [priceBreakdown]="priceBreakdown()"
        [submitting]="submitting()"
        [submitError]="submitError()"
        (confirm)="onConfirmSubmit($event)"
      ></app-confirm-step>
      <div class="step-nav">
        <button mat-stroked-button matStepperPrevious>上一步</button>
      </div>
    </mat-step>
  </mat-stepper>
</div>
